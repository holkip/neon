<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEON ABYSS v8.5 PRO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#03030a;color:#d0d0f0;font-family:'Courier New',monospace;font-size:13px}
:root{
  --pk:#ff2d78;--cy:#00f5d4;--go:#ffd700;--pu:#b060ff;
  --bg0:#03030a;--bg1:#080816;--bg2:#0e0e22;--bg3:#14142e;
  --border:rgba(0,245,212,.15);--bpk:rgba(255,45,120,.2);
  --dim:#606080;--mid:#9090b0;--com:#707090;--epi:#b060ff;--leg:#ffd700;
}
@keyframes logoPulse{0%,100%{text-shadow:0 0 8px var(--pk),0 0 20px var(--pk)}50%{text-shadow:0 0 16px var(--pk),0 0 50px var(--pk),0 0 90px rgba(255,45,120,.5)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes notifIn{from{opacity:0;transform:translateX(110px)}to{opacity:1;transform:translateX(0)}}
@keyframes notifOut{from{opacity:1}to{opacity:0;transform:translateX(110px)}}
@keyframes legendGlow{0%,100%{box-shadow:0 0 6px rgba(255,215,0,.3)}50%{box-shadow:0 0 18px rgba(255,215,0,.6)}}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{flex-shrink:0;background:var(--bg1);border-bottom:1px solid var(--bpk);padding:9px 18px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:50}
#logo{font-size:19px;font-weight:bold;letter-spacing:5px;color:var(--pk);animation:logoPulse 3s infinite;user-select:none}
#logo span{color:var(--cy)}
.hud-stat{text-align:center; margin-left: 15px}
.hud-lbl{font-size:9px;color:var(--dim);text-transform:uppercase}
.hud-val{font-size:15px;font-weight:bold}

#body{flex:1;display:flex;overflow:hidden}
#sidebar{width:180px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:10px 0}
.tab-btn{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;border-left:2px solid transparent;color:var(--mid);padding:10px 12px;cursor:pointer;font-family:'Courier New';font-size:12px;transition:all .2s}
.tab-btn.active{color:var(--cy);border-left-color:var(--cy);background:rgba(0,245,212,.06)}

#chat-wrap{margin-top:auto;border-top:1px solid var(--border);padding:8px}
#chat-msgs{height:120px;overflow-y:auto;font-size:10px;color:var(--mid);margin-bottom:5px}

/* Main Content */
#main{flex:1;overflow-y:auto;padding:16px 20px;position:relative}
.tab-pane{display:none;animation:fadeIn .3s ease}.tab-pane.active{display:block}
.sec-title{font-size:12px;color:var(--cy);letter-spacing:3px;text-transform:uppercase;margin-bottom:13px}

/* Grid & Cards */
.w-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;text-align:center}
.btn{background:transparent;border:1px solid;padding:7px 14px;cursor:pointer;font-family:'Courier New';font-size:11px;border-radius:4px;transition:all .2s;text-transform:uppercase}
.btn-cy{border-color:var(--cy);color:var(--cy)}.btn-cy:hover{background:rgba(0,245,212,.1)}
.btn-go{border-color:var(--go);color:var(--go)}.btn-go:hover{background:rgba(255,215,0,.1)}
.btn-pk{border-color:var(--pk);color:var(--pk)}

/* Canvas */
#game-outer{position:relative;border:1px solid rgba(0,245,212,.3);border-radius:8px;overflow:hidden;background:#000;margin-bottom:12px}
#game-canvas{display:block;width:100%;cursor:crosshair}
#notifs{position:fixed;right:14px;bottom:18px;display:flex;flex-direction:column;gap:6px;z-index:9000}
.notif{background:var(--bg2);border:1px solid var(--cy);border-radius:5px;padding:8px 12px;font-size:11px;animation:notifIn .35s ease}

/* Skins Specific */
.skin-card{border:1px solid var(--border);border-radius:8px;padding:15px;text-align:center;transition:.3s}
.skin-card.active{border-color:var(--go);box-shadow:0 0 10px rgba(255,215,0,0.2)}
.skin-img{width:60px;height:60px;margin:0 auto 10px;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:30px}
</style>
</head>
<body>

<div id="app">
<header id="header">
  <div id="logo">NEON <span>ABYSS</span></div>
  <div style="display:flex">
    <div class="hud-stat"><div class="hud-lbl">Кредиты</div><div class="hud-val" style="color:var(--go)" id="hud-cr">0</div></div>
    <div class="hud-stat"><div class="hud-lbl">Кристаллы</div><div class="hud-val" style="color:var(--pu)" id="hud-xt">0</div></div>
  </div>
</header>

<div id="body">
  <aside id="sidebar">
    <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">⚔ Полигон</button>
    <button class="tab-btn" data-tab="campaign" onclick="switchTab('campaign')">🗺 Кампания</button>
    <button class="tab-btn" data-tab="skins" onclick="switchTab('skins')">👤 Скины</button>
    <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">⚙ Настройки</button>
    
    <div id="chat-wrap">
      <div id="chat-msgs"></div>
      <input type="text" id="chat-in" placeholder="Чат..." style="width:100%;background:#000;border:1px solid var(--border);color:#fff;padding:4px;font-size:10px" onkeydown="if(event.key==='Enter')sendChat()">
    </div>
  </aside>

  <main id="main">
    <!-- POLYGON -->
    <div id="tab-home" class="tab-pane active">
      <div class="sec-title">Боевой Полигон</div>
      <div id="game-outer">
        <canvas id="game-canvas"></canvas>
      </div>
      <div class="sec-title">Арсенал</div>
      <div class="w-grid" id="arsenal-grid"></div>
    </div>

    <!-- CAMPAIGN -->
    <div id="tab-campaign" class="tab-pane">
        <div class="sec-title">Миссии Кампании</div>
        <div class="w-grid" id="campaign-grid"></div>
    </div>

    <!-- SKINS -->
    <div id="tab-skins" class="tab-pane">
      <div class="sec-title">Магазин скинов</div>
      <div class="w-grid" id="skin-grid"></div>
    </div>

    <!-- SETTINGS -->
    <div id="tab-settings" class="tab-pane">
        <div class="sec-title">Настройки</div>
        <div class="card">
            <button class="btn btn-pk" onclick="resetGame()">Сбросить прогресс</button>
        </div>
    </div>
  </main>
</div>
</div>

<div id="notifs"></div>

<script>
/**
 * GLOBAL STATE
 */
const GS = {
    credits: 1500,
    crystals: 10,
    playerLevel: 1,
    ownedSkins: ['default'],
    equippedSkin: 'default',
    currentTab: 'home',
    playerHistory: [] // Для Сандевистана
};

const SKINS_DATA = [
    { id: 'default', name: 'Неоновый Беглец', costCredits: 0, costCrystals: 0, icon: '👤', unlocked: true },
    { id: 'david', name: 'Дэвид Мартинес', costCredits: 2000, costCrystals: 15, icon: '⚡', unlocked: false },
    { id: 'lucy', name: 'Люси', costCredits: 1500, costCrystals: 5, icon: '💠', unlocked: false }
];

const WEAPONS = [
    { id: 'pulse', name: 'Pulse Rifle', dmg: 120, cost: 0, icon: '🔫' },
    { id: 'railgun', name: 'Abyss Railgun', dmg: 950, cost: 2500, icon: '🚀' }
];

/**
 * CORE LOGIC
 */
const el = id => document.getElementById(id);

function saveGameProgress() {
    localStorage.setItem('neon_abyss_save', JSON.stringify({
        credits: GS.credits,
        crystals: GS.crystals,
        ownedSkins: GS.ownedSkins,
        equippedSkin: GS.equippedSkin
    }));
}

function loadGameProgress() {
    const save = localStorage.getItem('neon_abyss_save');
    if(save) {
        const data = JSON.parse(save);
        GS.credits = data.credits;
        GS.crystals = data.crystals;
        GS.ownedSkins = data.ownedSkins;
        GS.equippedSkin = data.equippedSkin;
        GS.ownedSkins.forEach(id => {
            const skin = SKINS_DATA.find(s => s.id === id);
            if(skin) skin.unlocked = true;
        });
    }
}

/**
 * 1. ИСПРАВЛЕННАЯ СИСТЕМА ПОКУПКИ
 */
function buySkin(skinId) {
    const skin = SKINS_DATA.find(s => s.id === skinId);
    if (!skin) return;
    
    if (GS.credits >= skin.costCredits && GS.crystals >= skin.costCrystals) {
        GS.credits -= skin.costCredits;
        GS.crystals -= skin.costCrystals;
        skin.unlocked = true;
        GS.ownedSkins.push(skinId);
        
        equipSkin(skinId); 
        saveGameProgress(); 
        updateUI();
        showNotif(`Облик ${skin.name} разблокирован!`);
    } else {
        showNotif("Недостаточно средств!", false);
    }
}

function equipSkin(skinId) {
    GS.equippedSkin = skinId;
    updateUI();
    saveGameProgress();
}

function updateUI() {
    el('hud-cr').textContent = GS.credits.toLocaleString();
    el('hud-xt').textContent = GS.crystals.toLocaleString();
    renderSkins();
}

/**
 * UI RENDERING
 */
function renderSkins() {
    const grid = el('skin-grid');
    grid.innerHTML = '';
    SKINS_DATA.forEach(skin => {
        const isEquipped = GS.equippedSkin === skin.id;
        const card = document.createElement('div');
        card.className = `card skin-card ${isEquipped ? 'active' : ''}`;
        
        let btnHTML = '';
        if(isEquipped) {
            btnHTML = `<button class="btn btn-full" disabled style="border-color:var(--go);color:var(--go)">Экипировано</button>`;
        } else if(skin.unlocked) {
            btnHTML = `<button class="btn btn-cy btn-full" onclick="equipSkin('${skin.id}')">Надеть</button>`;
        } else {
            btnHTML = `<button class="btn btn-go btn-full" onclick="buySkin('${skin.id}')">Купить за ${skin.costCredits}</button>`;
        }

        card.innerHTML = `
            <div class="skin-img">${skin.icon}</div>
            <div style="font-weight:bold;margin-bottom:5px">${skin.name}</div>
            ${btnHTML}
        `;
        grid.appendChild(card);
    });
}

function renderArsenal() {
    const grid = el('arsenal-grid');
    grid.innerHTML = '';
    WEAPONS.forEach(w => {
        grid.innerHTML += `<div class="card">
            <div>${w.icon}</div>
            <b>${w.name}</b><br>
            <small>Урон: ${w.dmg}</small>
        </div>`;
    });
}

/**
 * 2. ИСПРАВЛЕННОЕ ОТОБРАЖЕНИЕ НА ПОЛИГОНЕ
 */
const Engine = {
    canvas: null, ctx: null,
    player: { x: 100, y: 200, vx: 0, vy: 0 },
    plats: [{x: 0, y: 280, w: 800, h: 20}, {x: 200, y: 200, w: 150, h: 10}, {x: 450, y: 150, w: 150, h: 10}],
    keys: {},

    init() {
        this.canvas = el('game-canvas');
        this.canvas.width = el('game-outer').offsetWidth;
        this.canvas.height = 300;
        this.ctx = this.canvas.getContext('2d');
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        this.loop();
    },

    update() {
        const p = this.player;
        if(this.keys['KeyA']) p.vx = -4;
        else if(this.keys['KeyD']) p.vx = 4;
        else p.vx *= 0.8;

        if(this.keys['KeyW'] && p.onGround) { p.vy = -10; p.onGround = false; }
        p.vy += 0.5; // Gravity
        p.x += p.vx; p.y += p.vy;

        p.onGround = false;
        this.plats.forEach(pl => {
            if(p.x < pl.x + pl.w && p.x + 20 > pl.x && p.y + 20 > pl.y && p.y + 20 < pl.y + pl.h) {
                p.y = pl.y - 20; p.vy = 0; p.onGround = true;
            }
        });

        // Запись истории для Сандевистана
        if(GS.equippedSkin === 'david') {
            GS.playerHistory.push({x: p.x, y: p.y});
            if(GS.playerHistory.length > 6) GS.playerHistory.shift();
        } else {
            GS.playerHistory = [];
        }
    },

    drawPlayer(ctx, playerX, playerY) {
        ctx.save();
        const currentSkin = GS.equippedSkin;
        
        if (currentSkin === 'david') {
            // 1. Отрисовка шлейфа
            GS.playerHistory.forEach((pos, index) => {
                ctx.save();
                ctx.globalAlpha = (index + 1) / (GS.playerHistory.length * 2);
                ctx.fillStyle = '#ffb700'; // Желтый след для Дэвида
                ctx.fillRect(pos.x, pos.y, 20, 20);
                ctx.restore();
            });
            
            // 2. Отрисовка Дэвида (ромб)
            ctx.shadowColor = '#ffb700';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ffb700';
            ctx.beginPath();
            ctx.translate(playerX + 10, playerY + 10);
            ctx.moveTo(0, -15);
            ctx.lineTo(15, 0);
            ctx.lineTo(0, 15);
            ctx.lineTo(-15, 0);
            ctx.closePath();
            ctx.fill();
        } else {
            // Стандартный скин
            ctx.shadowColor = '#00f5d4';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#00f5d4';
            ctx.fillRect(playerX, playerY, 20, 20);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(playerX, playerY, 20, 20);
        }
        ctx.restore();
    },

    loop() {
        this.update();
        const ctx = this.ctx;
        ctx.fillStyle = '#020208';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Draw Plats
        ctx.fillStyle = '#14142e';
        this.plats.forEach(pl => ctx.fillRect(pl.x, pl.y, pl.w, pl.h));

        this.drawPlayer(ctx, this.player.x, this.player.y);
        requestAnimationFrame(() => this.loop());
    }
};

/**
 * SYSTEM
 */
function switchTab(name) {
    GS.currentTab = name;
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    el('tab-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
}

function showNotif(txt, good = true) {
    const n = el('notifs');
    const d = document.createElement('div');
    d.className = 'notif';
    d.style.borderColor = good ? 'var(--cy)' : 'var(--pk)';
    d.textContent = txt;
    n.appendChild(d);
    setTimeout(() => d.remove(), 3000);
}

function sendChat() {
    const input = el('chat-in');
    if(!input.value) return;
    const msg = document.createElement('div');
    msg.textContent = `Вы: ${input.value}`;
    el('chat-msgs').appendChild(msg);
    input.value = '';
    el('chat-msgs').scrollTop = el('chat-msgs').scrollHeight;
}

function resetGame() {
    if(confirm("Сбросить всё?")) {
        localStorage.removeItem('neon_abyss_save');
        location.reload();
    }
}

// Start
loadGameProgress();
updateUI();
renderArsenal();
Engine.init();

// Bots simulation
setInterval(() => {
    const botMsgs = ["Нужен рейд на 5 уровень", " Railgun имба!", "Как купить Дэвида?", "HOLKIP дает бонусы"];
    const d = document.createElement('div');
    d.innerHTML = `<span style="color:var(--cy)">Bot_${Math.floor(Math.random()*99)}:</span> ${botMsgs[Math.floor(Math.random()*botMsgs.length)]}`;
    el('chat-msgs').appendChild(d);
    el('chat-msgs').scrollTop = el('chat-msgs').scrollHeight;
}, 8000);

</script>
</body>
</html>
