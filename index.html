<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEON ABYSS v8.5 PRO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#03030a;color:#d0d0f0;font-family:'Courier New',monospace;font-size:13px}
:root{
  --pk:#ff2d78;--cy:#00f5d4;--go:#ffd700;--pu:#b060ff;
  --bg0:#03030a;--bg1:#080816;--bg2:#0e0e22;--bg3:#14142e;
  --border:rgba(0,245,212,.15);--bpk:rgba(255,45,120,.2);
  --dim:#606080;--mid:#9090b0;--com:#707090;--epi:#b060ff;--leg:#ffd700;
}
@keyframes logoPulse{0%,100%{text-shadow:0 0 8px var(--pk),0 0 20px var(--pk)}50%{text-shadow:0 0 16px var(--pk),0 0 50px var(--pk),0 0 90px rgba(255,45,120,.5)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes notifIn{from{opacity:0;transform:translateX(110px)}to{opacity:1;transform:translateX(0)}}
@keyframes notifOut{from{opacity:1}to{opacity:0;transform:translateX(110px)}}
@keyframes legendGlow{0%,100%{box-shadow:0 0 6px rgba(255,215,0,.3),inset 0 0 6px rgba(255,215,0,.06)}50%{box-shadow:0 0 18px rgba(255,215,0,.6),inset 0 0 10px rgba(255,215,0,.12)}}
@keyframes epicGlow{0%,100%{box-shadow:0 0 5px rgba(176,96,255,.3)}50%{box-shadow:0 0 14px rgba(176,96,255,.5)}}
@keyframes warnBlink{0%,100%{opacity:1}50%{opacity:.4}}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:rgba(0,245,212,.3);border-radius:2px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#header{flex-shrink:0;background:var(--bg1);border-bottom:1px solid var(--bpk);padding:9px 18px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:50}
#logo{font-size:19px;font-weight:bold;letter-spacing:5px;color:var(--pk);animation:logoPulse 3s ease-in-out infinite;user-select:none}
#logo span{color:var(--cy)}
.hud-stat{text-align:center}
.hud-lbl{font-size:9px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.hud-val{font-size:15px;font-weight:bold}
#hdr-right{display:flex;align-items:center;gap:15px}

#body{flex:1;display:flex;overflow:hidden}
#sidebar{width:174px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:10px 0}
.tab-btn{display:flex;align-items:center;gap:9px;width:100%;background:transparent;border:none;border-left:2px solid transparent;color:var(--mid);padding:10px 12px;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;text-align:left;transition:all .2s}
.tab-btn.active{color:var(--cy);border-left-color:var(--cy);background:rgba(0,245,212,.06)}

#main{flex:1;overflow-y:auto;padding:16px 20px;position:relative}
.tab-pane{display:none;animation:fadeIn .3s ease}.tab-pane.active{display:block}
.sec-title{font-size:12px;color:var(--cy);letter-spacing:3px;text-transform:uppercase;margin-bottom:13px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}

.btn{background:transparent;border:1px solid;padding:7px 14px;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;border-radius:4px;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
.btn-cy{border-color:var(--cy);color:var(--cy)}.btn-cy:hover{background:rgba(0,245,212,0.1)}
.btn-pk{border-color:var(--pk);color:var(--pk)}.btn-pk:hover{background:rgba(255,45,120,0.1)}
.btn-go{border-color:var(--go);color:var(--go)}.btn-go:hover{background:rgba(255,215,0,0.1)}
.btn-full{width:100%}

#game-outer{position:relative;border:1px solid rgba(0,245,212,.3);border-radius:8px;overflow:hidden;background:#000;margin-bottom:12px}
#game-canvas{display:block;width:100%;cursor:crosshair;background: #020208;}

/* SKINS UI */
#skin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:10px}
.skin-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;transition:all .25s;position:relative}
.skin-card.active-skin{border-color:var(--go);box-shadow:0 0 15px rgba(255,215,0,0.2)}
.skin-name{font-size:13px;font-weight:bold;margin-bottom:5px;color:#fff}
.skin-price{font-size:11px;color:var(--go);margin:8px 0;font-weight:bold}
.skin-canvas-wrap{width:64px;height:64px;margin:0 auto 10px;background:rgba(0,0,0,0.3);border-radius:4px}

#notifs{position:fixed;right:14px;bottom:18px;display:flex;flex-direction:column;gap:6px;z-index:9000;pointer-events:none}
.notif{background:var(--bg2);border:1px solid var(--cy);border-radius:5px;padding:8px 12px;font-size:11px;color:var(--cy);animation:notifIn .35s ease}

#chat-msgs{height:100px;overflow-y:auto;padding:5px;font-size:10px;background:rgba(0,0,0,0.2)}
#shop-warn{display:none;color:var(--pk);text-align:center;font-weight:bold;margin-bottom:10px;animation:warnBlink 0.5s infinite}
</style>
</head>
<body>

<div id="app">
<header id="header">
  <div id="logo">NEON <span>ABYSS</span></div>
  <div id="hdr-right">
    <div class="hud-stat"><div class="hud-lbl">Кредиты</div><div class="hud-val" style="color:var(--go)" id="hud-cr">0</div></div>
    <div class="hud-stat"><div class="hud-lbl">Кристаллы</div><div class="hud-val" style="color:var(--pu)" id="hud-xt">0</div></div>
  </div>
</header>

<div id="body">
  <aside id="sidebar">
    <button class="tab-btn active" data-tab="home" onclick="switchTab('home')">⚔ Полигон</button>
    <button class="tab-btn" data-tab="skins" onclick="switchTab('skins')">👤 Скины</button>
    <div style="margin-top:auto; padding:10px;">
        <div style="font-size:9px; color:var(--dim)">CHAT</div>
        <div id="chat-msgs"></div>
    </div>
  </aside>

  <main id="main">
    <!-- POLYGON -->
    <div id="tab-home" class="tab-pane active">
      <div class="sec-title">Боевой Полигон</div>
      <div id="game-outer">
        <canvas id="game-canvas" width="800" height="400"></canvas>
      </div>
      <p style="font-size:10px; color:var(--dim)">WASD - движение, ЛКМ - огонь (Скин Дэвида активирует Сандевистан при движении)</p>
    </div>

    <!-- SKINS -->
    <div id="tab-skins" class="tab-pane">
      <div class="sec-title">Магазин Обликов</div>
      <div id="shop-warn">⚠ НЕДОСТАТОЧНО СРЕДСТВ!</div>
      <div id="skin-grid"></div>
    </div>
  </main>
</div>
</div>

<div id="notifs"></div>

<script>
/**
 * GLOBAL STATE
 */
const GS = {
    credits: 1500,
    crystals: 10,
    ownedSkins: ['default'],
    equippedSkin: 'default',
    currentTab: 'home'
};

/**
 * SKIN DATABASE
 */
const SKINS_DB = [
    { id: 'default', name: 'Беглец', costCredits: 0, costCrystals: 0, desc: 'Стандартный костюм.' },
    { id: 'david', name: 'Дэвид Мартинес', costCredits: 2500, costCrystals: 15, desc: 'Легенда Найт-Сити. Эффект шлейфа.' },
    { id: 'lucy', name: 'Люси', costCredits: 1800, costCrystals: 5, desc: 'Нетраннер. Бирюзовое сияние.' },
    { id: 'chrome', name: 'Хром Самурай', costCredits: 4000, costCrystals: 20, desc: 'Полная замена тела.' }
];

const el = id => document.getElementById(id);
const fmt = n => n.toLocaleString();

/**
 * PERSISTENCE
 */
function saveProgress() {
    localStorage.setItem('neon_abyss_data', JSON.stringify({
        credits: GS.credits,
        crystals: GS.crystals,
        ownedSkins: GS.ownedSkins,
        equippedSkin: GS.equippedSkin
    }));
}

function loadProgress() {
    const data = localStorage.getItem('neon_abyss_data');
    if (data) {
        const parsed = JSON.parse(data);
        GS.credits = parsed.credits || 1500;
        GS.crystals = parsed.crystals || 0;
        GS.ownedSkins = parsed.ownedSkins || ['default'];
        GS.equippedSkin = parsed.equippedSkin || 'default';
    }
}

/**
 * UI MODULE
 */
const UI = {
    updateHUD() {
        el('hud-cr').textContent = fmt(GS.credits);
        el('hud-xt').textContent = fmt(GS.crystals);
    },

    showNotif(text, isGood = true) {
        const c = el('notifs');
        const d = document.createElement('div');
        d.className = 'notif';
        if (!isGood) d.style.borderColor = 'var(--pk)';
        d.textContent = text;
        c.appendChild(d);
        setTimeout(() => d.remove(), 3000);
    },

    addChat(user, msg) {
        const c = el('chat-msgs');
        c.innerHTML += `<div><b style="color:var(--cy)">${user}:</b> ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    },

    renderSkins() {
        const grid = el('skin-grid');
        grid.innerHTML = '';

        SKINS_DB.forEach(skin => {
            const isOwned = GS.ownedSkins.includes(skin.id);
            const isActive = GS.equippedSkin === skin.id;
            
            const card = document.createElement('div');
            card.className = `skin-card ${isActive ? 'active-skin' : ''}`;
            
            let actionBtn = '';
            if (isActive) {
                actionBtn = `<button class="btn btn-full" disabled style="color:var(--go); border-color:var(--go)">● АКТИВЕН</button>`;
            } else if (isOwned) {
                actionBtn = `<button class="btn btn-cy btn-full" onclick="UI.equipSkin('${skin.id}')">НАДЕТЬ</button>`;
            } else {
                actionBtn = `<button class="btn btn-go btn-full" onclick="UI.buySkin('${skin.id}')">КУПИТЬ ЗА ${skin.costCredits}</button>`;
            }

            card.innerHTML = `
                <div class="skin-canvas-wrap"></div>
                <div class="skin-name">${skin.name}</div>
                <div style="font-size:10px; color:var(--dim); margin-bottom:10px">${skin.desc}</div>
                ${!isOwned ? `<div class="skin-price">💰 ${skin.costCredits} | 💠 ${skin.costCrystals}</div>` : ''}
                ${actionBtn}
            `;
            grid.appendChild(card);
        });
    },

    buySkin(id) {
        const skin = SKINS_DB.find(s => s.id === id);
        if (!skin) return;

        const canAfford = GS.credits >= skin.costCredits && GS.crystals >= skin.costCrystals;

        if (canAfford) {
            GS.credits -= skin.costCredits;
            GS.crystals -= skin.costCrystals;
            GS.ownedSkins.push(id);
            
            this.showNotif(`🔓 Скин "${skin.name}" разблокирован!`);
            this.equipSkin(id); // Автоматически надеваем
            saveProgress();
        } else {
            const warn = el('shop-warn');
            warn.style.display = 'block';
            setTimeout(() => warn.style.display = 'none', 2000);
            this.showNotif("Недостаточно средств!", false);
        }
    },

    equipSkin(id) {
        GS.equippedSkin = id;
        this.renderSkins();
        this.updateHUD();
        this.showNotif(`👤 Облик изменен на "${SKINS_DB.find(s=>s.id===id).name}"`);
        saveProgress();
    }
};

/**
 * GAME ENGINE
 */
const Engine = {
    canvas: null,
    ctx: null,
    player: { x: 400, y: 200, vx: 0, vy: 0, w: 20, h: 20 },
    history: [], // Для шлейфа Сандевистана
    keys: {},
    mouse: { x: 0, y: 0 },

    init() {
        this.canvas = el('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        window.addEventListener('keydown', e => this.keys[e.code] = true);
        window.addEventListener('keyup', e => this.keys[e.code] = false);
        this.canvas.addEventListener('mousemove', e => {
            const r = this.canvas.getBoundingClientRect();
            this.mouse.x = e.clientX - r.left;
            this.mouse.y = e.clientY - r.top;
        });

        this.loop();
    },

    update() {
        // Движение
        if (this.keys['KeyA']) this.player.vx = -4;
        else if (this.keys['KeyD']) this.player.vx = 4;
        else this.player.vx *= 0.8;

        if (this.keys['KeyW']) this.player.vy = -4;
        else if (this.keys['KeyS']) this.player.vy = 4;
        else this.player.vy *= 0.8;

        this.player.x += this.player.vx;
        this.player.y += this.player.vy;

        // Границы
        this.player.x = Math.max(0, Math.min(800 - this.player.w, this.player.x));
        this.player.y = Math.max(0, Math.min(400 - this.player.h, this.player.y));

        // Логика шлейфа для Дэвида
        if (GS.equippedSkin === 'david') {
            this.history.push({ x: this.player.x, y: this.player.y });
            if (this.history.length > 8) this.history.shift();
        } else {
            this.history = [];
        }
    },

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, 800, 400);

        // Сетка
        ctx.strokeStyle = 'rgba(0, 245, 212, 0.05)';
        for(let i=0; i<800; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke(); }

        const cx = this.player.x + this.player.w / 2;
        const cy = this.player.y + this.player.h / 2;

        // 1. Отрисовка Шлейфа (Сандевистан)
        if (GS.equippedSkin === 'david' && this.history.length > 0) {
            this.history.forEach((pos, i) => {
                ctx.save();
                ctx.globalAlpha = (i / this.history.length) * 0.4;
                ctx.shadowColor = "#ffb700";
                ctx.shadowBlur = 10;
                ctx.fillStyle = "#ffb700";
                ctx.fillRect(pos.x, pos.y, this.player.w, this.player.h);
                ctx.restore();
            });
        }

        // 2. Отрисовка самого Игрока
        ctx.save();
        if (GS.equippedSkin === 'david') {
            // Эффект Дэвида - неоновый ромб-прицел
            ctx.translate(cx, cy);
            ctx.shadowColor = "#ffb700";
            ctx.shadowBlur = 15;
            ctx.strokeStyle = "#ffb700";
            ctx.lineWidth = 3;
            
            ctx.beginPath();
            ctx.moveTo(0, -15);
            ctx.lineTo(15, 0);
            ctx.lineTo(0, 15);
            ctx.lineTo(-15, 0);
            ctx.closePath();
            ctx.stroke();
            
            ctx.fillStyle = "rgba(255, 183, 0, 0.3)";
            ctx.fill();
            
            // Точка в центре
            ctx.fillStyle = "#fff";
            ctx.fillRect(-2, -2, 4, 4);
        } else {
            // Стандартный игрок
            ctx.shadowColor = "var(--cy)";
            ctx.shadowBlur = 10;
            ctx.fillStyle = GS.equippedSkin === 'lucy' ? "#b060ff" : "#00f5d4";
            ctx.fillRect(this.player.x, this.player.y, this.player.w, this.player.h);
            ctx.strokeStyle = "#fff";
            ctx.strokeRect(this.player.x, this.player.y, this.player.w, this.player.h);
        }
        ctx.restore();

        // Прицел
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.beginPath();
        ctx.moveTo(this.mouse.x - 10, this.mouse.y); ctx.lineTo(this.mouse.x + 10, this.mouse.y);
        ctx.moveTo(this.mouse.x, this.mouse.y - 10); ctx.lineTo(this.mouse.x, this.mouse.y + 10);
        ctx.stroke();
    },

    loop() {
        Engine.update();
        Engine.draw();
        requestAnimationFrame(() => Engine.loop());
    }
};

/**
 * APP INIT
 */
function switchTab(name) {
    GS.currentTab = name;
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    el('tab-' + name).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    if (name === 'skins') UI.renderSkins();
}

// Запуск
loadProgress();
UI.updateHUD();
Engine.init();
UI.addChat("СИСТЕМА", "Добро пожаловать в Neon Abyss v8.5!");
UI.addChat("CyberHacker", "Промокодов пока нет, фарми кредиты на полигоне!");
</script>

</body>
</html>
