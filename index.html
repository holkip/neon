<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEON ABYSS: NEXT-GEN REBIRTH</title>
<style>
:root {
    --pk: #ff2d78; --cy: #00f5d4; --go: #ffd700; --pu: #b060ff;
    --bg: #03030a; --card: rgba(14, 14, 34, 0.9); --border: rgba(0, 245, 212, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
    background: var(--bg); color: #d0d0f0; 
    font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; 
}

/* --- NEON UI --- */
.neon-text { text-shadow: 0 0 10px var(--cy), 0 0 20px var(--cy); color: var(--cy); }
.neon-border { border: 1px solid var(--border); box-shadow: 0 0 15px var(--border); }
.glow-pk { box-shadow: 0 0 20px var(--pk); border-color: var(--pk); }
.glow-go { box-shadow: 0 0 20px var(--go); border-color: var(--go); }

/* --- LAYOUT --- */
#app { display: flex; flex-direction: column; height: 100vh; }

header {
    height: 60px; background: #080816; border-bottom: 2px solid var(--pk);
    display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
    box-shadow: 0 0 25px rgba(255, 45, 120, 0.3); z-index: 100;
}

#logo { font-size: 24px; font-weight: bold; letter-spacing: 5px; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; text-shadow: 0 0 20px var(--pk); } }

.stats-bar { display: flex; gap: 20px; }
.stat-item { text-align: center; }
.stat-val { font-size: 18px; font-weight: bold; display: block; }
.stat-lbl { font-size: 9px; color: #606080; text-transform: uppercase; }

#body { display: flex; flex: 1; overflow: hidden; }

/* --- SIDEBAR --- */
#sidebar { 
    width: 200px; background: #080816; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 10px 0;
}
.nav-btn {
    padding: 15px 20px; background: transparent; border: none; color: #9090b0;
    text-align: left; cursor: pointer; font-family: inherit; font-size: 13px;
    border-left: 3px solid transparent; transition: 0.3s;
}
.nav-btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
.nav-btn.active { 
    color: var(--cy); border-left-color: var(--cy); 
    background: rgba(0, 245, 212, 0.1); text-shadow: 0 0 10px var(--cy);
}

/* --- MAIN CONTENT --- */
#content { flex: 1; padding: 20px; overflow-y: auto; position: relative; }
.tab-pane { display: none; animation: fadeIn 0.4s ease; }
.tab-pane.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* --- POLYGON PANEL --- */
.poly-container { display: flex; gap: 20px; margin-bottom: 20px; }
#canvas-wrap { position: relative; flex: 1; background: #000; border-radius: 8px; border: 2px solid var(--border); overflow: hidden; }
#game-canvas { display: block; cursor: none; }

.side-panel { width: 250px; display: flex; flex-direction: column; gap: 15px; }
.info-card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
.btn { 
    padding: 12px; border: 1px solid var(--cy); background: rgba(0, 245, 212, 0.1); 
    color: var(--cy); cursor: pointer; font-family: inherit; text-transform: uppercase;
    font-weight: bold; transition: 0.2s; border-radius: 4px;
}
.btn:hover { background: var(--cy); color: #000; box-shadow: 0 0 20px var(--cy); }
.btn-pk { border-color: var(--pk); color: var(--pk); background: rgba(255, 45, 120, 0.1); }
.btn-pk:hover { background: var(--pk); color: #fff; box-shadow: 0 0 20px var(--pk); }

/* --- ARSENAL --- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
.item-card { 
    background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border);
    text-align: center; position: relative; transition: 0.3s;
}
.item-card.locked { opacity: 0.6; filter: grayscale(1); }
.item-card.active { border-color: var(--go); box-shadow: 0 0 15px var(--go); }
.item-icon { font-size: 32px; margin-bottom: 10px; display: block; }

/* --- CHAT & PROMO --- */
#chat-msgs { height: 150px; overflow-y: auto; font-size: 11px; padding: 10px; color: #8080a0; }
.promo-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 200; }
#author { position: fixed; bottom: 10px; left: 10px; font-size: 10px; color: #404060; }

/* --- NOTIFICATIONS --- */
#notifs { position: fixed; top: 70px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
.notif { background: #080816; border: 1px solid var(--cy); padding: 10px 20px; border-radius: 4px; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

/* Skins Specific */
.skin-card { cursor: pointer; }
.skin-card img { width: 100%; border-radius: 4px; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="app">
    <header>
        <div id="logo" class="neon-text">NEON<span>ABYSS</span></div>
        <div class="stats-bar">
            <button id="sound-btn" class="btn btn-pk" onclick="AudioSys.toggle()">🔊 ЗВУК: ВКЛ</button>
            <div class="stat-item"><span class="stat-lbl">Кристаллы</span><span id="hud-crystals" class="stat-val" style="color:var(--pu)">0</span></div>
            <div class="stat-item"><span class="stat-lbl">Кредиты</span><span id="hud-credits" class="stat-val" style="color:var(--go)">0</span></div>
        </div>
    </header>

    <div id="body">
        <aside id="sidebar">
            <button class="nav-btn active" onclick="showTab('polygon')">⚔ ПОЛИГОН</button>
            <button class="nav-btn" onclick="showTab('campaign')">🗺 КАМПАНИЯ</button>
            <button class="nav-btn" onclick="showTab('shop')">🏪 МАГАЗИН</button>
            <button class="nav-btn" onclick="showTab('entertainment')">🎰 РАЗВЛЕЧЕНИЯ</button>
            <button class="nav-btn" onclick="showTab('inventory')">🎒 ИНВЕНТАРЬ</button>
            <button class="nav-btn" onclick="showTab('skins')">👤 СКИНЫ</button>
            <button class="nav-btn" onclick="showTab('settings')">⚙ НАСТРОЙКИ</button>

            <div id="chat-msgs"></div>
            <div id="author">Разработчик: Komiljanov B.</div>
        </aside>

        <main id="content">
            <!-- TAB: POLYGON -->
            <div id="tab-polygon" class="tab-pane active">
                <div class="poly-container">
                    <div id="canvas-wrap">
                        <canvas id="game-canvas"></canvas>
                    </div>
                    <div class="side-panel">
                        <div class="info-card neon-border">
                            <h3 class="neon-text">АРСЕНАЛ ИНФО</h3>
                            <p id="wpn-name" style="margin-top:10px; font-weight:bold;">Pulse Rifle</p>
                            <p id="wpn-stats" style="font-size:12px; color:#aaa; margin-bottom:10px;">Урон: 120 | КД: 0.45с</p>
                            <div id="wpn-type" style="font-size:10px; color:var(--pk); letter-spacing:1px;">ТИП: ОЧЕРЕДЬ</div>
                        </div>
                        <button class="btn glow-go" onclick="Game.clickerAction()">💰 БЫСТРЕЕ (+30 кр.)</button>
                        <button class="btn btn-pk" onclick="Game.resetTargets()">↺ СБРОС МИШЕНЕЙ</button>
                    </div>
                </div>
                <h3 class="neon-text">ДОСТУПНОЕ ОРУЖИЕ</h3>
                <div class="grid" id="arsenal-grid"></div>
            </div>

            <!-- TAB: SKINS -->
            <div id="tab-skins" class="tab-pane">
                <h2 class="neon-text">МАГАЗИН ОБЛИКОВ</h2>
                <div class="grid" id="skins-grid"></div>
            </div>

            <!-- Other tabs placeholder -->
            <div id="tab-campaign" class="tab-pane"><h2>КАМПАНИЯ: ДОСТУПНО С 5 УРОВНЯ</h2></div>
            <div id="tab-shop" class="tab-pane"><h2>МАГАЗИН: ОБНОВЛЕНИЕ ЧЕРЕЗ 2ч.</h2></div>
            <div id="tab-inventory" class="tab-pane"><h2>ИНВЕНТАРЬ ПУСТ</h2></div>
        </main>
    </div>

    <div class="promo-wrap">
        <div class="info-card neon-border" style="display:flex; gap:10px; padding:10px;">
            <input type="text" id="promo-in" placeholder="ПРОМОКОД" style="background:#000; border:1px solid var(--border); color:#fff; padding:5px; width:100px;">
            <button class="btn" style="padding:5px 10px;" onclick="Game.redeemPromo()">ОК</button>
        </div>
    </div>
</div>

<div id="notifs"></div>

<script>
/**
 * SENIOR CORE MODULE: GLOBAL STATE & CONFIG
 */
const GS = {
    credits: parseInt(localStorage.getItem('na_credits')) || 1500,
    crystals: parseInt(localStorage.getItem('na_crystals')) || 10,
    ownedSkins: JSON.parse(localStorage.getItem('na_skins')) || ['default'],
    equippedSkin: localStorage.getItem('na_eq_skin') || 'default',
    equippedWpn: 'pulse',
    sound: true,
    promoUsed: false,
    history: [] // For Sandevistan trail
};

const WEAPONS = {
    pulse: { name: 'Pulse Rifle', dmg: 120, cd: 450, type: 'Очередь', icon: '🔫', cost: 0 },
    vortex: { name: 'Vortex Blade', dmg: 350, cd: 800, type: 'Тяжелое', icon: '⚔', cost: 5000 },
    ballista: { name: 'Abyss Ballista', dmg: 1200, cd: 2000, type: 'Снайперское', icon: '🏹', cost: 12000 },
    minigun: { name: 'Gold Minigun', dmg: 80, cd: 100, type: 'Скорострел', icon: '🔥', cost: 25000 }
};

const SKINS = [
    { id: 'default', name: 'Неоновый Беглец', cost: 0, cry: 0, icon: '👤', desc: 'Базовый протокол.' },
    { id: 'david', name: 'Дэвид Мартинес', cost: 25000, cry: 50, icon: '⚡', desc: 'Легенда. Эффект Сандевистана. КД -15%.' },
    { id: 'void', name: 'Хакер Пустоты', cost: 10000, cry: 20, icon: '👾', desc: 'Скрытность в коде.' },
    { id: 'samurai', name: 'Хром Самурай', cost: 15000, cry: 30, icon: '👺', desc: 'Честь и сталь.' }
];

/**
 * AUDIO ENGINE: WEB AUDIO API
 */
const AudioSys = (() => {
    let ctx = null;
    return {
        init() { if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        toggle() {
            GS.sound = !GS.sound;
            document.getElementById('sound-btn').innerText = `🔊 ЗВУК: ${GS.sound ? 'ВКЛ' : 'ВЫКЛ'}`;
        },
        playShoot() {
            if(!GS.sound) return; this.init();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        },
        playHit() {
            if(!GS.sound) return; this.init();
            const noise = ctx.createBufferSource();
            const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i=0; i<buffer.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            noise.connect(gain); gain.connect(ctx.destination);
            noise.start();
        }
    };
})();

/**
 * GAME ENGINE: CANVAS & LOGIC
 */
const Game = (() => {
    let canvas, ctx, animationId;
    let targets = [];
    let bullets = [];
    let mouse = { x: 0, y: 0 };
    let lastFire = 0;

    class Target {
        constructor(x, y, isPlatform = false) {
            this.x = x; this.y = y; this.r = 15;
            this.hp = 100; this.isPlatform = isPlatform;
            this.w = isPlatform ? 100 : 30;
            this.h = isPlatform ? 10 : 30;
        }
        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.isPlatform ? '#00f5d4' : '#ff2d78';
            ctx.fillStyle = this.isPlatform ? 'rgba(0, 245, 212, 0.5)' : 'rgba(255, 45, 120, 0.8)';
            ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
            ctx.shadowBlur = 0;
        }
    }

    return {
        init() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d');
            this.resize();
            window.addEventListener('resize', () => this.resize());
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
                // Sandevistan Logic
                if(GS.equippedSkin === 'david') {
                    GS.history.push({x: mouse.x, y: mouse.y, alpha: 1.0});
                    if(GS.history.length > 7) GS.history.shift();
                }
            });
            canvas.addEventListener('mousedown', () => this.shoot());
            this.spawnTargets();
            this.loop();
        },
        resize() {
            const wrap = document.getElementById('canvas-wrap');
            canvas.width = wrap.offsetWidth;
            canvas.height = 400;
        },
        spawnTargets() {
            targets = [];
            // Anti-abuse: Spawn platforms and targets only in upper 2/3
            for(let i=0; i<5; i++) {
                let px = Math.random() * (canvas.width - 100) + 50;
                let py = Math.random() * (canvas.height * 0.6) + 50;
                targets.push(new Target(px, py, true)); // Platform
                targets.push(new Target(px, py - 25, false)); // Target on it
            }
        },
        resetTargets() { this.spawnTargets(); notify("Мишени обновлены"); },
        shoot() {
            const now = Date.now();
            const wpn = WEAPONS[GS.equippedWpn];
            let cd = wpn.cd;
            if(GS.equippedSkin === 'david') cd *= 0.85; // 15% CD reduction

            if(now - lastFire < cd) return;
            
            AudioSys.playShoot();
            // Anti-abuse check for bottom zone
            if(mouse.y > canvas.height * 0.8) {
                notify("Стрельба в мертвой зоне запрещена", false);
                return;
            }

            targets.forEach((t, index) => {
                if(!t.isPlatform && 
                   mouse.x > t.x - 15 && mouse.x < t.x + 15 && 
                   mouse.y > t.y - 15 && mouse.y < t.y + 15) {
                    this.hit(index);
                }
            });
            lastFire = now;
        },
        hit(idx) {
            AudioSys.playHit();
            const wpn = WEAPONS[GS.equippedWpn];
            GS.credits += 50;
            updateStats();
            targets.splice(idx, 1);
            if(targets.filter(t => !t.isPlatform).length === 0) {
                setTimeout(() => this.spawnTargets(), 1000);
            }
        },
        clickerAction() {
            GS.credits += 30;
            updateStats();
            AudioSys.playHit();
        },
        redeemPromo() {
            const val = document.getElementById('promo-in').value;
            if(val.toUpperCase() === "HOLKIP") {
                if(!GS.promoUsed) {
                    GS.credits += 5000;
                    GS.promoUsed = true;
                    updateStats();
                    notify("Промокод активирован: +5000 кр.");
                } else {
                    notify("Уже использовался", false);
                }
            } else {
                notify("Неверный код", false);
            }
        },
        loop() {
            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Dead Zone
            ctx.fillStyle = 'rgba(255, 45, 120, 0.05)';
            ctx.fillRect(0, canvas.height * 0.8, canvas.width, canvas.height * 0.2);
            ctx.strokeStyle = 'rgba(255, 45, 120, 0.2)';
            ctx.strokeRect(0, canvas.height * 0.8, canvas.width, canvas.height * 0.2);

            targets.forEach(t => t.draw());

            // Draw Sandevistan After-Images
            if(GS.equippedSkin === 'david') {
                GS.history.forEach((h, i) => {
                    ctx.globalAlpha = (i + 1) / 10;
                    this.drawCrosshair(h.x, h.y, '#00f0ff');
                });
                ctx.globalAlpha = 1.0;
                this.drawCrosshair(mouse.x, mouse.y, '#ffb700', true);
            } else {
                this.drawCrosshair(mouse.x, mouse.y, '#00f5d4');
            }

            animationId = requestAnimationFrame(() => this.loop());
        },
        drawCrosshair(x, y, color, isSpecial = false) {
            ctx.save();
            ctx.translate(x, y);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            
            if(isSpecial) {
                // David Martinez Diamond Crosshair
                ctx.rotate(Math.PI / 4);
                ctx.strokeRect(-12, -12, 24, 24);
                ctx.strokeRect(-5, -5, 10, 10);
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI*2);
                ctx.moveTo(-15, 0); ctx.lineTo(15, 0);
                ctx.moveTo(0, -15); ctx.lineTo(0, 15);
                ctx.stroke();
            }
            ctx.restore();
        }
    };
})();

/**
 * UI & SKINS MANAGER
 */
function showTab(id) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function updateStats() {
    document.getElementById('hud-credits').innerText = GS.credits.toLocaleString();
    document.getElementById('hud-crystals').innerText = GS.crystals.toLocaleString();
    localStorage.setItem('na_credits', GS.credits);
    localStorage.setItem('na_crystals', GS.crystals);
}

function notify(text, success = true) {
    const container = document.getElementById('notifs');
    const el = document.createElement('div');
    el.className = 'notif';
    el.style.borderColor = success ? 'var(--cy)' : 'var(--pk)';
    el.innerText = text;
    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

function renderArsenal() {
    const grid = document.getElementById('arsenal-grid');
    grid.innerHTML = '';
    Object.keys(WEAPONS).forEach(key => {
        const w = WEAPONS[key];
        const card = document.createElement('div');
        card.className = `item-card ${GS.equippedWpn === key ? 'active' : ''}`;
        card.innerHTML = `
            <span class="item-icon">${w.icon}</span>
            <strong>${w.name}</strong><br>
            <small>${w.type}</small><br>
            <button class="btn btn-pk" style="width:100%; margin-top:10px" onclick="equipWpn('${key}')">ВЫБРАТЬ</button>
        `;
        grid.appendChild(card);
    });
}

function equipWpn(key) {
    GS.equippedWpn = key;
    const w = WEAPONS[key];
    document.getElementById('wpn-name').innerText = w.name;
    document.getElementById('wpn-stats').innerText = `Урон: ${w.dmg} | КД: ${w.cd/1000}с`;
    document.getElementById('wpn-type').innerText = `ТИП: ${w.type}`;
    renderArsenal();
    notify(`Экипировано: ${w.name}`);
}

function renderSkins() {
    const grid = document.getElementById('skins-grid');
    grid.innerHTML = '';
    SKINS.forEach(s => {
        const owned = GS.ownedSkins.includes(s.id);
        const active = GS.equippedSkin === s.id;
        const card = document.createElement('div');
        card.className = `item-card ${active ? 'active' : ''} ${!owned ? 'locked' : ''}`;
        card.innerHTML = `
            <span class="item-icon">${s.icon}</span>
            <strong>${s.name}</strong><br>
            <small style="font-size:10px; display:block; height:30px">${s.desc}</small>
            ${owned ? 
                `<button class="btn" style="width:100%; margin-top:10px" onclick="equipSkin('${s.id}')">${active ? 'ЭКИПИРОВАНО' : 'ВЫБРАТЬ'}</button>` :
                `<button class="btn btn-pk" style="width:100%; margin-top:10px" onclick="buySkin('${s.id}')">КУПИТЬ (${s.cost} кр.)</button>`
            }
        `;
        grid.appendChild(card);
    });
}

function buySkin(id) {
    const s = SKINS.find(x => x.id === id);
    if(GS.credits >= s.cost && GS.crystals >= s.cry) {
        GS.credits -= s.cost;
        GS.crystals -= s.cry;
        GS.ownedSkins.push(id);
        localStorage.setItem('na_skins', JSON.stringify(GS.ownedSkins));
        updateStats();
        renderSkins();
        notify("Облик приобретен!");
    } else {
        notify("Недостаточно средств", false);
    }
}

function equipSkin(id) {
    GS.equippedSkin = id;
    localStorage.setItem('na_eq_skin', id);
    renderSkins();
    notify(`Облик изменен: ${SKINS.find(x=>x.id===id).name}`);
}

/**
 * LIVE CHAT SIMULATION
 */
const chatMessages = [
    "Pulse Rifle - лучший выбор для фарма мишеней!",
    "Кто-нибудь уже купил скин Мартинеса? Шлейф просто огонь!",
    "На 5 уровне кампании реально жарко.",
    "Промокод HOLKIP еще работает?",
    "Анти-абуз система теперь не дает фармить внизу, черт...",
    "Накопил 25к на золотой миниган, он того стоит!",
    "Эффект Сандевистана реально уменьшает КД выстрела."
];

function simulateChat() {
    const chat = document.getElementById('chat-msgs');
    setInterval(() => {
        const msg = chatMessages[Math.floor(Math.random() * chatMessages.length)];
        const user = "User_" + Math.floor(Math.random() * 999);
        chat.innerHTML += `<div><span style="color:var(--cy)">${user}:</span> ${msg}</div>`;
        if(chat.childNodes.length > 10) chat.removeChild(chat.firstChild);
        chat.scrollTop = chat.scrollHeight;
    }, 7000);
}

// BOOTSTRAP
window.onload = () => {
    Game.init();
    updateStats();
    renderArsenal();
    renderSkins();
    simulateChat();
    notify("Система Neon Abyss Online");
};
</script>
</body>
</html>
